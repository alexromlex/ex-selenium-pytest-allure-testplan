[pytest]
markers =
    run: "Information for hooks like test running order: run(order=1)"
    critical: "Critical functionality"
    smoke: "Quick tests for critical functionality"
    regression: "Full regression test suite"
    sanity: "Sanity Test"
    frontend: "Frontend UI tests"
    backend: "Backend/API tests"
    slow: "Tests that take more than 5 seconds"
    flaky: "Tests that are unstable"
    integration: "Tests with external dependencies"
    security: "Test with security sensitive"
    unit: "Unit tests"
    e2e: "End to End tests"
    positive: "Test Positive result"
    negative: "Test Negative result"
    seo: "SEO Test"
    ui: "User Interface tests"
    release_01: "Only functionality - release 01"
    release_02: "Only functionality - release 02"
    release_03: "Only functionality - release 03"
    release_04: "Only functionality - release 04"
    release_05: "Only functionality - release 05"


    


minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*


filterwarnings =
    ignore::DeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning
    ignore::requests.packages.urllib3.exceptions.InsecureRequestWarning